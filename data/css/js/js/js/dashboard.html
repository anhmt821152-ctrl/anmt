<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - TMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="app-layout">
        
        <h2 class="mb-4">Tổng quan hệ thống (Dashboard)</h2>
        
        <div class="row mb-4">
            <div class="col-md-2"><div class="card card-tms p-3 text-center border-bottom border-primary border-4"><h3 id="kpi-total">0</h3><p class="mb-0 text-muted">Tổng Container</p></div></div>
            <div class="col-md-2"><div class="card card-tms p-3 text-center border-bottom border-warning border-4"><h3 id="kpi-yard">0</h3><p class="mb-0 text-muted">Đang lưu bãi</p></div></div>
            <div class="col-md-2"><div class="card card-tms p-3 text-center border-bottom border-success border-4"><h3 id="kpi-in">0</h3><p class="mb-0 text-muted">Container Nhập</p></div></div>
            <div class="col-md-2"><div class="card card-tms p-3 text-center border-bottom border-info border-4"><h3 id="kpi-out">0</h3><p class="mb-0 text-muted">Container Xuất</p></div></div>
            <div class="col-md-2"><div class="card card-tms p-3 text-center border-bottom border-danger border-4"><h3>12</h3><p class="mb-0 text-muted">Xe trong bãi</p></div></div>
            <div class="col-md-2"><div class="card card-tms p-3 text-center border-bottom border-secondary border-4"><h3>10</h3><p class="mb-0 text-muted">Khách hàng</p></div></div>
        </div>

        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card card-tms p-3">
                    <h5 class="mb-3"><i class="fas fa-bell text-warning"></i> Cảnh báo hệ thống</h5>
                    <div class="alert alert-warning alert-tms">⚠ 5 Container lưu bãi > 30 ngày</div>
                    <div class="alert alert-danger alert-tms">⚠ Xe nâng RTG-01 đang bảo trì</div>
                    <div class="alert alert-info alert-tms">⚠ 2 xe đang chờ check-in tại cổng</div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card card-tms p-3">
                    <canvas id="containerChart" height="100"></canvas>
                </div>
            </div>
        </div>

    </div>

    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
