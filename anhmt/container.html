<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Container - TMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app-layout">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Quản lý Container</h2>
            <div>
                <button class="btn btn-success" onclick="exportExcel()"><i class="fas fa-file-excel"></i> Xuất Excel</button>
                <button class="btn btn-primary" id="btnAddCont" data-bs-toggle="modal" data-bs-target="#contModal"><i class="fas fa-plus"></i> Thêm mới</button>
            </div>
        </div>

        <div class="card card-tms p-3">
            <div class="table-responsive">
                <table class="table table-hover table-bordered text-center align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Mã</th><th>Số Container</th><th>Loại/Size</th><th>Khách hàng</th>
                            <th>Vị trí</th><th>Trạng thái</th><th>Ngày nhập</th><th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="contTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="contModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Thông tin Container</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="contForm">
                        <input type="hidden" id="contId">
                        <div class="mb-2"><label>Số Container</label><input type="text" class="form-control" id="contNum" required></div>
                        <div class="row">
                            <div class="col-6 mb-2"><label>Loại</label><input type="text" class="form-control" id="contType" placeholder="Dry/Reefer"></div>
                            <div class="col-6 mb-2"><label>Kích thước</label><input type="text" class="form-control" id="contSize" placeholder="20DC/40HC"></div>
                        </div>
                        <div class="mb-2"><label>Khách hàng</label><input type="text" class="form-control" id="contCus"></div>
                        <div class="mb-2"><label>Vị trí</label><input type="text" class="form-control" id="contLoc"></div>
                        <div class="mb-2"><label>Trạng thái</label>
                            <select class="form-control" id="contStatus">
                                <option>Lưu bãi</option><option>Đã xuất</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mt-3">Lưu dữ liệu</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script src="js/container.js"></script>
</body>
</html>
