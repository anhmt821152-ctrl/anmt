<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - TMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card card-tms p-4" style="width: 400px;">
        <div class="text-center mb-4">
            <h3 class="text-primary fw-bold">TMS LOGISTICS</h3>
            <p class="text-muted">Đăng nhập hệ thống</p>
        </div>
        <div class="alert alert-danger d-none" id="loginError">Sai tài khoản hoặc mật khẩu! (Thử: admin/123)</div>
        <form id="loginForm">
            <div class="mb-3">
                <label>Tài khoản</label>
                <input type="text" id="username" class="form-control" required value="admin">
            </div>
            <div class="mb-4">
                <label>Mật khẩu</label>
                <input type="password" id="password" class="form-control" required value="123">
            </div>
            <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
        </form>
    </div>
    
    <script src="js/storage.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
